# SPDX-License-Identifier: MIT
# yaml-language-server: $schema=https://www.schemastore.org/github-action.json
name: "Prettier + Markdownlint"
author: "Oluf Lorenzen <ol+forgejo-action@oluflorenzen.de"
description: Prettier + Markdownlint + push changes

inputs:
  prettier_plugins:
    description: 'Additional prettier plugins to install, space-separated, e.g. "prettier-plugin-toml prettier-plugin-sh prettier-plugin-merge"'
    required: false
    default: "prettier-plugin-toml prettier-plugin-sh prettier-plugin-merge"
  prettier_options:
    description: "Prettier CLI options"
    required: false
    default: "--write ."
  markdownlint_globs:
    description: "Glob pattern for markdownlint"
    required: false
    default: "**/*.md"
  skip_checkout:
    description: "Skip the checkout step (useful when calling the action from a workflow that already checked out the code)"
    required: false
    default: "false"
  skip_commit:
    description: "Skip the commit and push step"
    required: false
    default: "false"
  commit_message:
    description: "Commit message for the auto-commit"
    required: false
    default: "chore: changes from ci"
  commit_user_name:
    description: "Git user name for the auto-commit"
    required: false
    default: "ci-linting"
  commit_user_email:
    description: "Git user email for the auto-commit"
    required: false
    default: ""
  commit_author:
    description: "Git author for the auto-commit"
    required: false
    default: ""

runs:
  using: "composite"
  #runs-on: ubuntu-latest
  steps:
    - name: Extract branch name
      shell: bash
      run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> "$GITHUB_OUTPUT"
      id: extract_branch

    - name: Checkout
      id: checkout
      if: inputs.skip_checkout != 'true'
      uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      with:
        fetch-depth: 1
        ref: ${{ steps.extract_branch.outputs.branch }}

    - name: Prettier
      shell: bash
      run: |
        echo "::group::Install prettier and plugins"
        PRETTIER_DIR=$(mktemp -d)
        pushd "$PRETTIER_DIR"
        npm init -y > /dev/null 2>&1
        npm install prettier ${{ inputs.prettier_plugins }}
        popd
        echo "::endgroup::"

        echo "::group::Prettifying files..."
        PLUGINS_REQUIRE=""
        PLUGINS_DISPLAY="["
        FIRST=true
        for plugin in ${{ inputs.prettier_plugins }}; do
          if [ "$FIRST" = true ]; then
            PLUGINS_REQUIRE="    require.resolve(\"$plugin\")"
            PLUGINS_DISPLAY="$PLUGINS_DISPLAY\"$plugin\""
            FIRST=false
          else
            PLUGINS_REQUIRE="$PLUGINS_REQUIRE,\n    require.resolve(\"$plugin\")"
            PLUGINS_DISPLAY="$PLUGINS_DISPLAY, \"$plugin\""
          fi
        done
        PLUGINS_DISPLAY="$PLUGINS_DISPLAY]"

        GENERATED_CONFIG=false
        CONFIG_PATH=$("$PRETTIER_DIR/node_modules/.bin/prettier" --find-config-path .prettier 2>&1 || true)
        if echo "$CONFIG_PATH" | grep -q 'Can not find configure file for'; then
          echo "No existing prettier config found, generating .prettierrc.cjs"
          printf 'module.exports = {\n  plugins: [\n%b\n  ],\n};\n' "$PLUGINS_REQUIRE" > .prettierrc.cjs
          cat .prettierrc.cjs
          GENERATED_CONFIG=true
        else
          echo "Existing prettier config found: $CONFIG_PATH"
          echo "::warning::Ensure your prettier config includes the plugins: $PLUGINS_DISPLAY"
        fi

        NODE_PATH="$PRETTIER_DIR/node_modules" "$PRETTIER_DIR/node_modules/.bin/prettier" ${{ inputs.prettier_options }}

        if [ "$GENERATED_CONFIG" = true ]; then
          rm -f .prettierrc.cjs
        fi
        rm -rf "$PRETTIER_DIR"
        echo "::endgroup::"

    - name: Markdownlint
      uses: https://github.com/DavidAnson/markdownlint-cli2-action@992badcdf24e3b8eb7e87ff9287fe931bcb00c6e # v20
      continue-on-error: true
      with:
        fix: true
        globs: ${{ inputs.markdownlint_globs }}

    - name: Git diff and status
      shell: sh
      run: |
        echo "::group::Git diff and status"
        git -c color.ui=always status; git -c color.ui=always diff
        echo "::endgroup::"

    - name: Commit and push linting fixes
      if: inputs.skip_commit != 'true'
      uses: https://github.com/stefanzweifel/git-auto-commit-action@v7.1.0
      with:
        branch: ${{ steps.extract_branch.outputs.branch }}
        commit_message: ${{ inputs.commit_message }}
        commit_user_name: ${{ inputs.commit_user_name }}
        commit_user_email: ${{ inputs.commit_user_email || '' }}
        commit_author: ${{ inputs.commit_author || '' }}
        add_options: "--update"
        status_options: "--untracked-files=no"
        repository: .

    - name: Markdownlint (blocking)
      uses: https://github.com/DavidAnson/markdownlint-cli2-action@992badcdf24e3b8eb7e87ff9287fe931bcb00c6e # v20
      with:
        globs: ${{ inputs.markdownlint_globs }}
